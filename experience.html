<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOG POV MODE — Scent Mission Wall</title>
<style>
  :root{
    --white:#fff;--mute:#8a8a8a;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#000;color:#fff;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"SF Mono",ui-monospace,"Cascadia Code","Consolas",monospace}

  .stage{position:fixed;inset:0;overflow:hidden}
  video#film{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:contrast(1.06) saturate(1.06) brightness(.96);
  }
  .vignette{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 90% 80% at 50% 45%,transparent 40%,rgba(0,0,0,.7) 100%);
  }
  .grain{
    position:absolute;inset:0;pointer-events:none;opacity:.05;
    background-image:radial-gradient(#fff 1px,transparent 1px);background-size:3px 3px;
    mix-blend-mode:overlay;
  }

  /* ---------- screens ---------- */
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;
    transition:opacity .8s var(--ease),visibility .8s var(--ease);z-index:5;
  }
  .screen.hidden{opacity:0;visibility:hidden;pointer-events:none}

  /* start screen */
  #start{background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
  .tag{font-size:12px;letter-spacing:.36em;color:#9a9a9a;text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:10px}
  .tag .dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.5s steps(1) infinite}
  @keyframes blink{50%{opacity:.15}}
  #start h1{font-size:clamp(34px,6vw,66px);font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-bottom:18px}
  #start p{color:#b8b8b8;font-size:16px;max-width:400px;margin-bottom:40px}
  .btn-glow{
    background:#fff;color:#000;font-size:15px;font-weight:600;padding:16px 36px;border-radius:100px;
    text-decoration:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:12px;
    transition:transform .3s var(--ease),box-shadow .3s var(--ease);font-family:inherit;
  }
  .btn-glow:hover{transform:translateY(-2px);box-shadow:0 12px 44px rgba(255,255,255,.28)}
  .btn-glow .arrow{transition:transform .3s var(--ease)}
  .btn-glow:hover .arrow{transform:translateX(5px)}
  .btn-line{
    background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);
    font-size:15px;font-weight:500;padding:15px 32px;border-radius:100px;cursor:pointer;
    text-decoration:none;display:inline-flex;align-items:center;gap:10px;font-family:inherit;
    transition:border-color .3s var(--ease),background .3s var(--ease)}
  .btn-line:hover{border-color:#fff;background:rgba(255,255,255,.08)}

  /* ---------- playback HUD ---------- */
  #hud{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity 1s var(--ease)}
  #hud.on{opacity:1}
  .corner{position:absolute;width:26px;height:26px;border:1px solid rgba(255,255,255,.5)}
  .corner.tl{top:26px;left:26px;border-right:0;border-bottom:0}
  .corner.tr{top:26px;right:26px;border-left:0;border-bottom:0}
  .corner.bl{bottom:26px;left:26px;border-right:0;border-top:0}
  .corner.br{bottom:26px;right:26px;border-left:0;border-top:0}

  .hud-top{position:absolute;top:30px;left:30px;right:30px;display:flex;justify-content:space-between;align-items:flex-start;font-size:11px;letter-spacing:.2em;color:#eaeaea;text-shadow:0 1px 4px #000}
  .rec{display:flex;align-items:center;gap:7px}
  .rec::before{content:"";width:9px;height:9px;border-radius:50%;background:#ff4040;animation:blink 1.1s steps(1) infinite}

  .metrics{position:absolute;left:34px;bottom:40px;display:flex;flex-direction:column;gap:14px}
  .metric{min-width:210px}
  .metric .k{font-size:10px;letter-spacing:.22em;color:#9a9a9a;margin-bottom:6px;display:flex;justify-content:space-between}
  .metric .k b{color:#fff;font-weight:500}
  .bar{height:3px;background:rgba(255,255,255,.16);border-radius:2px;overflow:hidden}
  .bar span{display:block;height:100%;width:20%;background:#fff;border-radius:2px;transition:width .9s var(--ease)}

  .crosshair{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:64px;height:64px;pointer-events:none;transition:opacity .5s var(--ease),transform 1s var(--ease)}
  .crosshair::before,.crosshair::after{content:"";position:absolute;background:rgba(255,255,255,.6)}
  .crosshair::before{top:50%;left:0;right:0;height:1px;transform:translateY(-50%)}
  .crosshair::after{left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%)}
  .crosshair .ring{position:absolute;inset:14px;border:1px solid rgba(255,255,255,.55);border-radius:50%}

  .target-status{position:absolute;top:calc(50% + 48px);left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.28em;color:#ffd24a;text-shadow:0 1px 4px #000}

  /* target locked flash */
  #locked{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .6s var(--ease),visibility .6s var(--ease);background:rgba(0,0,0,.2)}
  #locked.on{opacity:1;visibility:visible}
  #locked .lockbox{border:1px solid rgba(255,255,255,.5);padding:26px 46px;backdrop-filter:blur(3px)}
  #locked .lockbox .lt{font-size:11px;letter-spacing:.3em;color:#9a9a9a;margin-bottom:10px}
  #locked .lockbox .lm{font-size:clamp(28px,5vw,50px);font-weight:600;letter-spacing:.04em}

  /* end screen */
  #end{background:rgba(0,0,0,.72);backdrop-filter:blur(6px)}
  #end .badge{font-size:11px;letter-spacing:.3em;color:#ffd24a;margin-bottom:18px}
  #end h2{font-size:clamp(30px,5vw,56px);font-weight:600;letter-spacing:.02em;margin-bottom:16px}
  #end p{color:#b8b8b8;font-size:16px;max-width:420px;margin-bottom:38px}
  .end-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

  /* top-left back link always available */
  .back{position:fixed;top:26px;left:26px;z-index:20;font-size:12px;letter-spacing:.14em;color:#cfcfcf;text-decoration:none;padding:8px 16px;border:1px solid rgba(255,255,255,.28);border-radius:100px;transition:background .3s,border-color .3s;backdrop-filter:blur(6px)}
  .back:hover{background:rgba(255,255,255,.1);border-color:#fff;color:#fff}

  /* progress line */
  #prog{position:fixed;top:0;left:0;height:2px;width:0;background:#fff;z-index:30;transition:width .2s linear}

  /* page transition curtain */
  #curtain{position:fixed;inset:0;z-index:9999;background:#050505;pointer-events:none;opacity:1;transition:opacity .7s var(--ease)}
  #curtain.gone{opacity:0}
  #curtain.leaving{opacity:1;pointer-events:auto}

  @media(max-width:640px){
    .metric{min-width:150px}
    .metrics{left:22px;bottom:30px}
    .corner{width:18px;height:18px}
  }
</style>
</head>
<body>

<div id="prog"></div>
<div id="curtain"></div>
<a href="index.html" class="back" data-nav>← 제품 보기</a>

<div class="stage">
  <video id="film" muted playsinline preload="auto" poster="assets/exploded.png">
    <source src="assets/dog-pov.mp4" type="video/mp4">
  </video>
  <div class="vignette"></div>
  <div class="grain"></div>
</div>

<!-- HUD overlay during playback -->
<div id="hud">
  <span class="corner tl"></span><span class="corner tr"></span>
  <span class="corner bl"></span><span class="corner br"></span>
  <div class="hud-top mono">
    <span class="rec">REC · DOG POV</span>
    <span>SMW-01 / SCENT TRACE</span>
  </div>
  <div class="crosshair"><span class="ring"></span></div>
  <div class="target-status mono" id="tstatus">SEARCHING</div>
  <div class="metrics mono">
    <div class="metric">
      <div class="k">SNIFF INTENSITY <b id="v1">32%</b></div>
      <div class="bar"><span id="b1" style="width:32%"></span></div>
    </div>
    <div class="metric">
      <div class="k">FOCUS LEVEL <b id="v2">STABLE</b></div>
      <div class="bar"><span id="b2" style="width:40%"></span></div>
    </div>
    <div class="metric">
      <div class="k">TARGET SIGNAL <b id="v3">SEARCHING</b></div>
      <div class="bar"><span id="b3" style="width:18%"></span></div>
    </div>
  </div>
</div>

<!-- TARGET LOCKED flash -->
<div id="locked">
  <div class="lockbox mono">
    <div class="lt">SCENT MATCH CONFIRMED</div>
    <div class="lm">TARGET LOCKED</div>
  </div>
</div>

<!-- START screen -->
<div class="screen" id="start">
  <div class="tag"><span class="dot"></span>DOG POV MODE</div>
  <h1>탐색견의 시야로<br>향기 미션월을.</h1>
  <p>사람은 볼 수 없는 향의 방향을 탐색견의 시점으로 경험합니다.</p>
  <button class="btn-glow" id="startBtn">시작하기 <span class="arrow">→</span></button>
</div>

<!-- END screen -->
<div class="screen hidden" id="end">
  <div class="badge mono">SESSION COMPLETE</div>
  <h2>TARGET LOCKED</h2>
  <p>탐색견이 특정 지점에 집중 반응을 보였습니다.</p>
  <div class="end-btns">
    <button class="btn-glow" id="replayBtn">다시 체험하기 <span class="arrow">↻</span></button>
    <a href="explore.html" class="btn-line" data-nav>탐색으로 돌아가기</a>
  </div>
</div>

<script>
  /* page transition curtain */
  const curtain=document.getElementById('curtain');
  addEventListener('load',()=>requestAnimationFrame(()=>curtain.classList.add('gone')));
  document.querySelectorAll('[data-nav]').forEach(a=>{a.addEventListener('click',e=>{const href=a.getAttribute('href');if(!href||href.startsWith('#'))return;e.preventDefault();curtain.classList.remove('gone');curtain.classList.add('leaving');setTimeout(()=>location.href=href,560);});});

  const film=document.getElementById('film');
  const hud=document.getElementById('hud');
  const startScreen=document.getElementById('start');
  const endScreen=document.getElementById('end');
  const locked=document.getElementById('locked');
  const prog=document.getElementById('prog');
  const tstatus=document.getElementById('tstatus');
  const v1=document.getElementById('v1'),v2=document.getElementById('v2'),v3=document.getElementById('v3');
  const b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3');

  let lockedShown=false;
  let finished=false;

  function startExperience(){
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    locked.classList.remove('on');
    lockedShown=false;
    finished=false;
    hud.classList.add('on');
    film.currentTime=0;
    const p=film.play();
    if(p&&p.catch)p.catch(()=>{});
  }

  function finishExperience(){
    if(finished)return;
    finished=true;
    film.pause();
    hud.classList.remove('on');
    endScreen.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('click',startExperience);
  document.getElementById('replayBtn').addEventListener('click',startExperience);

  // drive HUD off video progress — rising sniff/focus, target lock near the end
  film.addEventListener('timeupdate',()=>{
    if(!film.duration)return;
    const t=film.currentTime/film.duration; // 0..1
    prog.style.width=(t*100)+'%';

    // sniff intensity climbs
    const sniff=Math.min(99,Math.round(32+t*66));
    v1.textContent=sniff+'%'; b1.style.width=sniff+'%';

    // focus level
    let focus='STABLE',fw=40;
    if(t>0.35){focus='RISING';fw=64}
    if(t>0.6){focus='HIGH';fw=82}
    if(t>0.82){focus='LOCKED';fw=100}
    v2.textContent=focus; b2.style.width=fw+'%';

    // target signal
    let sig='SEARCHING',sw=18;
    if(t>0.45){sig='TRACE';sw=44}
    if(t>0.68){sig='APPROACHING';sw=70}
    if(t>0.82){sig='LOCKED';sw=100}
    v3.textContent=sig; b3.style.width=sw+'%';
    tstatus.textContent = t>0.82 ? 'TARGET LOCKED' : (t>0.68?'APPROACHING':'SEARCHING');
    tstatus.style.color = t>0.82 ? '#4affa0' : '#ffd24a';

    // flash TARGET LOCKED once
    if(t>0.84 && !lockedShown){
      lockedShown=true;
      locked.classList.add('on');
      setTimeout(()=>locked.classList.remove('on'),1600);
    }

    // fallback: finish reliably even if 'ended' doesn't fire
    if(t>=0.992) finishExperience();
  });

  film.addEventListener('ended',finishExperience);

  // allow click on video to end quickly? no — keep clean.
</script>
</body>
</html>
